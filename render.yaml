services:
  # Frontend (Node.js para servir archivos estáticos y variables de entorno)
  - type: web
    name: mdt-frontend
    env: node
    region: oregon
    plan: free
    buildCommand: cd mdt-sistema-web/frontend && npm install --legacy-peer-deps --include=dev && npm run build
    startCommand: cd mdt-sistema-web/frontend && npx http-server dist -p 3000 -c-1
    envVars:
      - key: PORT
        value: 3000
      - key: VITE_API_URL
        value: https://backend-ghe2.onrender.com
      - key: VITE_BOT_API_URL
        value: http://179.41.11.247:7843
      - key: VITE_BOT_API_KEY
        value: ARM_API_KEY_2026_CAMBIAR_EN_PRODUCCION_RENACIMIENTO
  
  # Backend API
  - type: web
    name: mdt-backend
    env: node
    region: oregon
    plan: free
    buildCommand: bash build.sh
    startCommand: bash start.sh
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: BOT_API_URL
        value: http://179.41.11.247:7843
      - key: BOT_API_KEY
        value: ARM_API_KEY_2026_CAMBIAR_EN_PRODUCCION_RENACIMIENTO
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: /tmp/mdt-local.db
      - key: CORS_ORIGIN
        value: https://amba-mdt-web-1.onrender.com,https://backend-ghe2.onrender.com
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
